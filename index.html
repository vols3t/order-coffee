<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Заказ кофе</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<form class="order-form">
  <fieldset class="beverage">
    <button type="button" class="remove-button" aria-label="Удалить напиток">×</button>
    <h4 class="beverage-count">Напиток №1</h4>
    <label class="field">
      <span class="label-text">Я буду</span>
      <select>
        <option value="espresso">Эспрессо</option>
        <option value="capuccino" selected>Капучино</option>
        <option value="cacao">Какао</option>
      </select>
    </label>
    <div class="field">
      <span class="checkbox-label">Сделайте напиток на</span>
      <label class="checkbox-field">
        <input type="radio" name="milk" value="usual" checked />
        <span>обычном молоке</span>
      </label>
      <label class="checkbox-field">
        <input type="radio" name="milk" value="no-fat" />
        <span>обезжиренном молоке</span>
      </label>
      <label class="checkbox-field">
        <input type="radio" name="milk" value="soy" />
        <span>соевом молоке</span>
      </label>
      <label class="checkbox-field">
        <input type="radio" name="milk" value="coconut" />
        <span>кокосовом молоке</span>
      </label>
    </div>
    <div class="field">
      <span class="checkbox-label">Добавьте к напитку:</span>
      <label class="checkbox-field">
        <input type="checkbox" name="options" value="whipped cream" />
        <span>взбитых сливок</span>
      </label>
      <label class="checkbox-field">
        <input type="checkbox" name="options" value="marshmallow" />
        <span>зефирок</span>
      </label>
      <label class="checkbox-field">
        <input type="checkbox" name="options" value="chocolate" />
        <span>шоколад</span>
      </label>
      <label class="checkbox-field">
        <input type="checkbox" name="options" value="cinnamon" />
        <span>корицу</span>
      </label>
    </div>
    <div class="field" style="margin-top: 15px;">
      <span class="label-text" style="width: auto; display: block; margin-bottom: 5px;">И еще вот что</span>
      <textarea class="wishes-input" rows="3" style="width: 100%; max-width: 400px;"></textarea>
      <p class="wishes-output" style="margin: 5px 0 0; font-size: 14px; min-height: 20px;"></p>
    </div>
  </fieldset>
  <div>
    <button type="button" class="add-button">+ Добавить напиток</button>
  </div>
  <div style="margin-top: 30px">
    <button type="submit" class="submit-button">Готово</button>
  </div>
</form>

<div class="modal-overlay hidden" id="order-modal">
  <div class="modal">
    <button type="button" class="close-modal" aria-label="Закрыть">×</button>
    <div class="modal-content">
      <h2>Заказ принят!</h2>
      <p class="beverage-count-message"></p>
      <table class="order-table">
        <thead>
        <tr>
          <th>Напиток</th>
          <th>Молоко</th>
          <th>Дополнительно</th>
          <th>Пожелания</th>
        </tr>
        </thead>
        <tbody id="order-table-body">
        </tbody>
      </table>

      <div style="margin-top: 20px; display: flex; flex-direction: column; align-items: flex-end;">
        <label style="margin-bottom: 10px;">
          Выберите время заказа
          <input type="time" id="order-time" required>
        </label>
        <button type="button" class="submit-button" id="confirm-order-button">Оформить</button>
      </div>
    </div>
  </div>
</div>

<script src="index.js"></script>
</body>
</html>
